<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Pallet Counter: Prototype</title>
  <meta name="theme-color" content="#0b1320" />
  <style>
    :root {
      --bg: #0b1320;
      --fg: #ffffff;
      --muted: #a9b1c3;
      --accent: #2dd36f;
      --danger: #e14b4b;
      --outline: #3c4a6b;
      --btn: #1f2a44;
      --btnHover: #2a385c;
      --chipBg: #102042;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .wrap { width:min(900px, 94vw); padding: clamp(14px, 3vw, 24px); }
    h1 { margin: 0 0 8px; font-size: clamp(20px, 4.5vw, 32px); font-weight: 700; }
    .sub { color: var(--muted); margin: 0 0 16px; font-size: clamp(12px, 3vw, 14px); }

    .topRow { display:flex; gap:10px; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .chip {
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px; border-radius:999px; border:1px solid var(--outline);
      background: var(--chipBg); color: var(--muted); font-size: 13px;
    }
    .chip.ok { color:#00e07b; border-color:#1ea458; background:#0c2a1e; }
    .chip.warn { color:#f3b100; }
    .chip.err { color:#ff6b6b; }

    label { display:block; color: var(--muted); margin: 12px 0 6px; }
    input {
      width: 100%; padding: 12px 14px; border-radius: 12px;
      border: 1px solid var(--outline); background: #0f1933; color: var(--fg);
      font-size: clamp(16px, 4vw, 18px); outline: none;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px #2dd36f22; }

    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      flex: 1; padding: 14px 18px; border-radius: 12px;
      border: 1px solid var(--outline); background: var(--btn); color: var(--fg);
      font-weight: 700; font-size: clamp(16px, 4vw, 18px); cursor: pointer; touch-action: manipulation;
    }
    .btn:hover { background: var(--btnHover); }
    .btn:active { transform: scale(0.98); }
    .btn-accent { background: var(--accent); color: #072612; border-color: #1ea458; }
    .btn-danger { background: var(--danger); border-color: #b73b3b; }
    .btn-ghost { background: transparent; }

    .counter {
      display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center;
      margin: 10px 0 6px;
    }
    .count {
      text-align: center; font-size: clamp(56px, 14vw, 96px); font-weight: 800; letter-spacing: 1px;
      user-select: none;
    }
    .plus { font-size: clamp(20px, 7vw, 28px); padding: clamp(14px, 3vw, 18px) clamp(18px, 4vw, 24px); }
    .minus { font-size: clamp(16px, 5vw, 22px); padding: clamp(10px, 2.5vw, 14px) clamp(14px, 3vw, 18px); }

    .status { margin-top: 10px; min-height: 24px; color: var(--muted); }
    .ok { color: var(--accent); } .err { color: var(--danger); } .warn { color: #f3b100; }

    .scanRow { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items:center; }
    .cameraPreview {
      display:none; position: fixed; inset: 0; background:#000c; backdrop-filter: blur(2px);
      align-items: center; justify-content: center; z-index: 50; padding: 16px;
    }
    .cameraCard { background:#0b142e; border:1px solid var(--outline); border-radius: 12px; width:min(720px, 94vw); padding:12px; }
    video { width: 100%; border-radius: 10px; background: #000; }
    .camRow { display:flex; gap:10px; margin-top:8px; }

    .tiny { font-size:12px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topRow">
      <div class="chip" id="wakeChip" title="Screen awake status">Screen: checking…</div>
      <div class="row" style="gap:8px; flex:0 0 auto;">
        <button class="btn btn-ghost" id="wakeBtn" title="Re-enable wake lock if needed">Keep Screen Awake</button>
        <button class="btn btn-ghost" id="fsBtn" title="Full screen">Full Screen</button>
      </div>
    </div>

    <h1>Pallet Counter</h1>

    <div>
      <label for="driver">Driver name</label>
      <input id="driver" type="text" placeholder="First Last" autocomplete="name" />
    </div>

    <div>
      <label for="inbound">Inbound #</label>
      <div class="scanRow">
        <input id="inbound" type="text" inputmode="numeric" placeholder="Scan or type inbound number" autocomplete="off" />
        <button class="btn" id="scanBtn" title="Scan with camera">📷 Scan</button>
      </div>
    </div>

    <div class="counter">
      <button class="btn minus" id="minusBtn" aria-label="Minus">−</button>
      <div class="count" id="count">0</div>
      <button class="btn btn-accent plus" id="plusBtn" aria-label="Plus">+</button>
    </div>

    <div class="row">
      <button class="btn" id="resetBtn" title="Reset count and inbound (name stays)">Reset</button>
      <button class="btn btn-danger" id="submitBtn">Submit</button>
    </div>

    <div class="status" id="status"></div>
    <div class="tiny">Shortcuts: <b>+</b> add, <b>-</b> remove, <b>Enter</b> submit, <b>R</b> reset.</div>
  </div>

  <!-- Camera modal -->
  <div class="cameraPreview" id="cameraModal" role="dialog" aria-modal="true" aria-label="Barcode scanner">
    <div class="cameraCard">
      <video id="video" playsinline></video>
      <div class="camRow">
        <button class="btn" id="stopScanBtn">Close</button>
        <div class="status" id="scanStatus" style="flex:1;"></div>
      </div>
    </div>
  </div>

<script>
/* ======= CONFIG (Telegram) ======= */
const BOT_TOKEN = "8660198678:AAFTQOlCEUS2qjHuwEDJCSAdx4cbEeVjbJE";
const CHAT_ID   = "8207417561";

/* ======= Elements ======= */
const elDriver   = document.getElementById('driver');
const elInbound  = document.getElementById('inbound');
const elCount    = document.getElementById('count');
const elStatus   = document.getElementById('status');
const plusBtn    = document.getElementById('plusBtn');
const minusBtn   = document.getElementById('minusBtn');
const resetBtn   = document.getElementById('resetBtn');
const submitBtn  = document.getElementById('submitBtn');
const scanBtn    = document.getElementById('scanBtn');
const cameraModal= document.getElementById('cameraModal');
const videoEl    = document.getElementById('video');
const scanStatus = document.getElementById('scanStatus');
const fsBtn      = document.getElementById('fsBtn');
const wakeBtn    = document.getElementById('wakeBtn');
const wakeChip   = document.getElementById('wakeChip');

/* ======= State ======= */
let count = 0;
let stream = null;
let scanning = false;
let wakeLock = null;

/* ======= Utilities ======= */
function render() { elCount.textContent = String(count); }

function status(msg, cls='') {
  elStatus.className = 'status ' + cls;
  elStatus.textContent = msg || '';
}

function scanStatusMsg(msg, cls='') {
  scanStatus.className = 'status ' + cls;
  scanStatus.textContent = msg || '';
}

function vibrate(ms=40) { try { navigator.vibrate && navigator.vibrate(ms); } catch{} }

function beep(freq=880, dur=80, vol=0.05) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.value = freq; g.gain.value = vol;
    o.start(); setTimeout(() => { o.stop(); ctx.close(); }, dur);
  } catch {}
}

function escapeHTML(s='') {
  return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ======= Wake Lock ======= */
function setWakeChip(text, cls='') {
  wakeChip.className = 'chip ' + cls;
  wakeChip.textContent = 'Screen: ' + text;
}

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) {
    setWakeChip('Not supported', 'warn');
    return;
  }
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    setWakeChip('On', 'ok');

    // Re-acquire when it is released (e.g., system events)
    wakeLock.addEventListener('release', () => {
      if (wakeLock && wakeLock.released) {
        setWakeChip('Off (released)', 'warn');
      }
    });
  } catch (err) {
    // Typical: iOS Low Power Mode denies lock; or user gesture not yet occurred
    setWakeChip('Blocked (try tap / disable Low Power)', 'err');
    console.warn('Wake Lock error:', err);
  }
}

async function enableWakeLock() {
  await requestWakeLock();
}

// Try on load and on user gesture (some browsers require a gesture)
window.addEventListener('load', enableWakeLock, { once: true });
window.addEventListener('pointerdown', () => { if (!wakeLock) enableWakeLock(); }, { once: true });

// Re-acquire on visibility changes
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && (!wakeLock || wakeLock.released)) {
    await enableWakeLock();
  }
});

// Manual button
wakeBtn.addEventListener('click', enableWakeLock);

/* ======= Persist driver name ======= */
elDriver.value = localStorage.getItem('driverName') || '';
elDriver.addEventListener('change', () => {
  localStorage.setItem('driverName', elDriver.value.trim());
});

/* ======= Counter handlers ======= */
plusBtn.addEventListener('click', () => { count++; render(); vibrate(30); beep(900,70,0.06); });
minusBtn.addEventListener('click', () => { if (count>0) { count--; render(); } vibrate(15); beep(280,60,0.04); });

window.addEventListener('keydown', (e) => {
  if (e.key === '+') { plusBtn.click(); }
  else if (e.key === '-' || e.key === '_') { minusBtn.click(); }
  else if (e.key === 'Enter') { submit(); }
  else if (e.key.toLowerCase() === 'r') { reset(); }
});

function reset() {
  count = 0; render(); elInbound.value = '';
  status('Reset. Driver name preserved on this device.', 'warn');
  vibrate(20);
}
resetBtn.addEventListener('click', reset);

/* ======= Full screen ======= */
fsBtn.addEventListener('click', () => {
  const el = document.documentElement;
  if (!document.fullscreenElement) el.requestFullscreen?.();
  else document.exitFullscreen?.();
});

/* ======= Camera Barcode Scan (native API) ======= */
async function startScan() {
  if (!('BarcodeDetector' in window)) {
    status('BarcodeDetector not supported on this device. Use hardware scanner.', 'warn');
    return;
  }
  try {
    const formats = ['code_128','code_39','ean_13','ean_8','upc_a','upc_e','qr_code'];
    const detector = new BarcodeDetector({ formats });
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    videoEl.srcObject = stream;
    await videoEl.play();
    scanning = true;
    cameraModal.style.display = 'flex';
    scanLoop(detector);
    scanStatusMsg('Point camera at barcode…', '');
  } catch (err) {
    console.error(err);
    status('Camera access failed. Check permissions.', 'err');
  }
}
async function scanLoop(detector) {
  try {
    while (scanning) {
      const barcodes = await detector.detect(videoEl);
      if (barcodes && barcodes.length) {
        const code = (barcodes[0].rawValue || '').trim();
        if (code) {
          elInbound.value = code;
          vibrate(60); beep(1000,90,0.08);
          stopScan();
          status('Inbound captured via camera.', 'ok');
          break;
        }
      }
      await new Promise(r => setTimeout(r, 120));
    }
  } catch (err) {
    console.error(err);
    scanStatusMsg('Scan error. Try again.', 'err');
  }
}
function stopScan() {
  scanning = false;
  if (videoEl) { videoEl.pause?.(); }
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  cameraModal.style.display = 'none';
}
scanBtn.addEventListener('click', startScan);
document.getElementById('stopScanBtn').addEventListener('click', stopScan);

/* ======= Telegram submission ======= */
async function submit() {
  const inbound = elInbound.value.trim();
  const driver  = elDriver.value.trim();

  if (!driver) { status('Please enter driver name.', 'err'); beep(220,120,0.06); return; }
  if (!inbound) { status('Please enter or scan the inbound #.', 'err'); beep(220,120,0.06); return; }
  if (count <= 0) { status('Count must be greater than zero.', 'err'); beep(220,120,0.06); return; }

  const submissionId = `${Date.now()}-${Math.random().toString(36).slice(2,8)}`;
  const textHTML =
    `<b>📦 Pallet Count Submitted</b>\n` +
    `Inbound: <code>${escapeHTML(inbound)}</code>\n` +
    `Driver: ${escapeHTML(driver)}\n` +
    `Pallets: <b>${count}</b>\n` +
    `Time: ${escapeHTML(new Date().toLocaleString())}\n` +
    `Ref: <code>${submissionId}</code>`;

  const apiBase = `https://api.telegram.org/bot${BOT_TOKEN}`;
  const postUrl = `${apiBase}/sendMessage`;
  const getUrl  = `${postUrl}?chat_id=${encodeURIComponent(CHAT_ID)}&parse_mode=HTML&text=${encodeURIComponent(textHTML)}`;

  submitBtn.disabled = true;
  status('Submitting to Telegram…');

  // Strategy 1: POST JSON (preferred)
  try {
    const res = await fetch(postUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: CHAT_ID, text: textHTML, parse_mode: 'HTML' })
    });
    if (res.ok) {
      status('Submitted to Telegram.', 'ok');
      vibrate(60); beep(980,90,0.08);
      count = 0; render(); elInbound.value = '';
      submitBtn.disabled = false;
      return;
    }
  } catch(e) {
    console.warn('POST failed, trying GET…', e);
  }

  // Strategy 2: GET (no-cors fire-and-forget)
  try {
    await fetch(getUrl, { method: 'GET', mode: 'no-cors' });
    status('Submitted (no-cors). Check Telegram.', 'ok');
    vibrate(60); beep(980,90,0.08);
    count = 0; render(); elInbound.value = '';
    submitBtn.disabled = false;
    return;
  } catch (e) {
    console.warn('GET no-cors failed, trying image beacon…', e);
  }

  // Strategy 3: Image beacon (always sends a GET)
  try {
    const img = new Image();
    img.src = getUrl + '&_=' + Date.now();
    status('Submitted (beacon). Check Telegram.', 'ok');
    vibrate(60); beep(980,90,0.08);
    count = 0; render(); elInbound.value = '';
  } catch (e) {
    console.error(e);
    status('Failed to submit to Telegram. Check network.', 'err');
    beep(200,140,0.07);
  } finally {
    submitBtn.disabled = false;
  }
}
submitBtn.addEventListener('click', submit);
</script>
</body>
</html>
